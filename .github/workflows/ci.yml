name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests -v
      - name: Run safety eval on source files
        run: python agent_safety_eval.py langgraph_board_runner.py agent_safety_eval.py rag_proof_retriever.py data/public_career_corpus.json --allow-framework LangGraph
