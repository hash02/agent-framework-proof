apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-framework-proof
  labels:
    app: agent-framework-proof
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-framework-proof
  template:
    metadata:
      labels:
        app: agent-framework-proof
    spec:
      containers:
        - name: api
          image: agent-framework-proof:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
